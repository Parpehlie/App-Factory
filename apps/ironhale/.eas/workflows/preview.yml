name: IronHale preview builds

on:
  workflow_dispatch: {}

jobs:
  quality:
    name: Typecheck and tests
    environment: preview
    defaults:
      run:
        working_directory: ../..
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Typecheck IronHale
        run: pnpm --filter ironhale typecheck
      - name: Run product tests
        run: pnpm test

  build_android:
    name: Build Android preview
    needs: [quality]
    environment: preview
    type: build
    params:
      platform: android
      profile: preview

  build_ios:
    name: Build iOS preview
    needs: [quality]
    environment: preview
    type: build
    params:
      platform: ios
      profile: preview
