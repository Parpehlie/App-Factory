name: IronHale store release

on:
  workflow_dispatch: {}

jobs:
  quality:
    name: Typecheck and tests
    environment: production
    defaults:
      run:
        working_directory: ../..
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Typecheck IronHale
        run: pnpm --filter ironhale typecheck
      - name: Run product tests
        run: pnpm test

  build_android:
    name: Build Android production
    needs: [quality]
    environment: production
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS production
    needs: [quality]
    environment: production
    type: build
    params:
      platform: ios
      profile: production

  approve_upload:
    name: Upload these builds to the stores?
    needs: [build_android, build_ios]
    type: require-approval

  submit_android:
    name: Upload to Google Play
    needs: [approve_upload, build_android]
    environment: production
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  submit_ios:
    name: Upload to App Store Connect
    needs: [approve_upload, build_ios]
    environment: production
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
